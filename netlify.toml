# Dynamic sitemap listing static pages + all published blog posts.
[[edge_functions]]
  path = "/sitemap.xml"
  function = "sitemap"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers (apply to every response) ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "geolocation=(self), microphone=(self), camera=(), payment=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://use.typekit.net https://p.typekit.net https://fonts.googleapis.com; font-src 'self' data: https://use.typekit.net https://p.typekit.net https://fonts.gstatic.com; img-src 'self' data: https:; media-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://use.typekit.net https://p.typekit.net https://ipwho.is https://ipapi.co https://api.bigdatacloud.net https://api.open-meteo.com https://*.googleapis.com; frame-src 'self' https://www.google.com https://maps.google.com; upgrade-insecure-requests"
