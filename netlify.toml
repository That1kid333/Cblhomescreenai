[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# Prerender the blog for crawlers/AI engines: inject real HTML + SEO metadata
# into the SPA shell for /blog and /blog/:slug. Static assets under /blog/*/*
# (images) have multiple path segments, so they don't match /blog/:slug.
[[edge_functions]]
  path = "/blog"
  function = "prerender"

[[edge_functions]]
  path = "/blog/:slug"
  function = "prerender"

[[edge_functions]]
  path = "/attractions"
  function = "prerender"

[[edge_functions]]
  path = "/directory"
  function = "prerender"

# Static marketing pages — prerender real title/meta/OG + hero content so the
# home page and section pages are crawlable (bots / AI engines / social scrapers).
[[edge_functions]]
  path = "/"
  function = "prerender"
[[edge_functions]]
  path = "/transportation"
  function = "prerender"
[[edge_functions]]
  path = "/eats-and-drinks"
  function = "prerender"
[[edge_functions]]
  path = "/travels"
  function = "prerender"
[[edge_functions]]
  path = "/meet-buckee"
  function = "prerender"
[[edge_functions]]
  path = "/our-story"
  function = "prerender"
[[edge_functions]]
  path = "/how-it-works"
  function = "prerender"
[[edge_functions]]
  path = "/concierge"
  function = "prerender"
[[edge_functions]]
  path = "/partner-restaurants"
  function = "prerender"
[[edge_functions]]
  path = "/partner-attractions"
  function = "prerender"
[[edge_functions]]
  path = "/affiliates"
  function = "prerender"
[[edge_functions]]
  path = "/faq"
  function = "prerender"
[[edge_functions]]
  path = "/contact"
  function = "prerender"
[[edge_functions]]
  path = "/login"
  function = "prerender"
[[edge_functions]]
